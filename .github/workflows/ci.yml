name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma Client
        # Run explicitly before any turbo task to eliminate race conditions where
        # `node_modules/.prisma/client/**` ends up partially written (turbo's cache
        # output spec only covers dist/**, not node_modules — so cached @axle/db
        # build replays logs without recreating the client). Eager generation here
        # guarantees a complete client in node_modules before downstream typecheck.
        # See .flowset/tech-debt.md "CI typecheck Prisma client 레이스 컨디션".
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma
      - run: npx turbo build --filter='./packages/*'
      - run: npx turbo lint

  typecheck:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma Client
        # Run explicitly before any turbo task to eliminate race conditions where
        # `node_modules/.prisma/client/**` ends up partially written (turbo's cache
        # output spec only covers dist/**, not node_modules — so cached @axle/db
        # build replays logs without recreating the client). Eager generation here
        # guarantees a complete client in node_modules before downstream typecheck.
        # See .flowset/tech-debt.md "CI typecheck Prisma client 레이스 컨디션".
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma
      - run: npx turbo build --filter='./packages/*'
      - run: npx turbo typecheck

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma
      - run: npx turbo build

  test:
    runs-on: ubuntu-latest
    needs: build
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma Client
        # Run explicitly before any turbo task to eliminate race conditions where
        # `node_modules/.prisma/client/**` ends up partially written (turbo's cache
        # output spec only covers dist/**, not node_modules — so cached @axle/db
        # build replays logs without recreating the client). Eager generation here
        # guarantees a complete client in node_modules before downstream typecheck.
        # See .flowset/tech-debt.md "CI typecheck Prisma client 레이스 컨디션".
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma
      - run: npx turbo build --filter='./packages/*'
      - run: npx turbo test
