# .github/workflows/e2e-write.yml
# Write (DB-mutating) E2E tests — run against a fully ephemeral Supabase local
# stack (Postgres + Storage) brought up by `supabase start`. This lets the
# @write/@smoke suite freely create/update/delete and exercises file uploads
# against a real Storage API without touching prod. Also keeps the
# regression-issue automation on main push.
name: E2E Write Tests (ephemeral)

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'e2e/**'
      - 'playwright.config.ts'
      - 'package-lock.json'
      - '.github/workflows/e2e-write.yml'
  pull_request:
    paths:
      - 'apps/web/app/(admin)/**'
      - 'apps/web/app/api/admin/**'
      - 'apps/web/app/api/clients/**'
      - 'apps/web/app/api/projects/**'
      - 'apps/web/src/components/clients/**'
      - 'packages/auth/**'
      - 'packages/db/prisma/schema.prisma'
      - 'packages/db/seed.ts'
      - 'packages/db/seed-e2e.ts'
      - 'e2e/**'
      - 'playwright.config.ts'
      - '.github/workflows/e2e-write.yml'
  schedule:
    - cron: '0 17 * * *'  # 02:00 KST (17:00 UTC prior day)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  write:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
      # CI-only secret — only needs to sign JWT sessions for this run
      NEXTAUTH_SECRET: axle-write-e2e-ci-only-secret-do-not-use-in-prod
      AUTH_SECRET: axle-write-e2e-ci-only-secret-do-not-use-in-prod
      NEXTAUTH_URL: http://localhost:3000
      AUTH_URL: http://localhost:3000
      E2E_BASE_URL: http://localhost:3000
      # DATABASE_URL / DIRECT_URL / SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY
      # are exported into $GITHUB_ENV by the "Start Supabase local stack" step.
      # E2E account fixtures (seeded by seed-e2e.ts into the ephemeral DB)
      E2E_PLATFORM_EMAIL: platform@e2e.axleai.io
      E2E_PLATFORM_PASSWORD: test1234
      E2E_ORG1_OWNER_EMAIL: owner1@e2e.axleai.io
      E2E_ORG1_OWNER_PASSWORD: test1234
      E2E_ORG1_MEMBER_EMAIL: member1@e2e.axleai.io
      E2E_ORG1_MEMBER_PASSWORD: test1234
      E2E_ORG2_OWNER_EMAIL: owner2@e2e.axleai.io
      E2E_ORG2_OWNER_PASSWORD: test1234
      # Legacy smoke specs (client/project/meeting CRUD) gate on these envs.
      # They now run against the ephemeral DB using the org1-owner seed and
      # the seeded E2E Client A so project/meeting create can pick a client.
      E2E_USER_EMAIL: owner1@e2e.axleai.io
      E2E_USER_PASSWORD: test1234
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local stack
        # Brings up Postgres (with pgvector) + Storage API behind the local
        # Supabase API gateway. Excludes services we don't use to keep startup
        # under ~60s. Uses `status -o json` (more stable across CLI versions
        # than `-o env`, which has changed key names in recent releases).
        run: |
          supabase start \
            --exclude realtime,studio,inbucket,functions,imgproxy,vector,edge_runtime,analytics,auth

          # Print env-form for debugging visibility (key names may vary by
          # CLI version) without exposing secrets in the run log.
          echo "::group::supabase status -o env (keys only)"
          supabase status -o env | sed -E 's/=.+/=<masked>/' || true
          echo "::endgroup::"

          STATUS_JSON="$(supabase status -o json)"
          DB_URL="$(echo "$STATUS_JSON" | jq -r '.DB_URL')"
          API_URL="$(echo "$STATUS_JSON" | jq -r '.API_URL')"
          # SERVICE_ROLE_KEY field name has been stable in JSON output across
          # CLI versions even when the env-format keys changed.
          SERVICE_ROLE_KEY="$(echo "$STATUS_JSON" | jq -r '.SERVICE_ROLE_KEY')"

          if [ -z "$SERVICE_ROLE_KEY" ] || [ "$SERVICE_ROLE_KEY" = "null" ]; then
            echo "::error::SERVICE_ROLE_KEY missing in supabase status JSON"
            echo "$STATUS_JSON" | jq 'keys' || true
            exit 1
          fi

          {
            echo "DATABASE_URL=$DB_URL"
            echo "DIRECT_URL=$DB_URL"
            echo "SUPABASE_URL=$API_URL"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
          } >> "$GITHUB_ENV"
          echo "Supabase local stack ready: API=$API_URL DB=$DB_URL"

      - name: Install psql for shadow DB setup
        # Needed to create the _prisma_shadow database used by the drift check below.
        # pgvector extension itself is now created by the baseline migration (0_init),
        # so the old `psql -c "CREATE EXTENSION vector"` step is no longer required.
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Drift detection (migrations ↔ schema)
        # If schema.prisma drifted from prisma/migrations/, fail the build —
        # forcing developers to add a new migration instead of silent `db push`.
        # Replays migrations into _prisma_shadow and diffs against schema.prisma.
        working-directory: packages/db
        run: |
          set -e
          psql "$DATABASE_URL" -c "DROP DATABASE IF EXISTS _prisma_shadow;"
          psql "$DATABASE_URL" -c "CREATE DATABASE _prisma_shadow;"
          SHADOW_URL="$(echo "$DATABASE_URL" | sed 's|/postgres|/_prisma_shadow|')"
          npx prisma migrate diff \
            --from-migrations ./prisma/migrations \
            --to-schema ./prisma/schema.prisma \
            --shadow-database-url "$SHADOW_URL" \
            --exit-code

      - name: Prisma generate
        working-directory: packages/db
        run: npx prisma generate

      - name: Prisma migrate deploy
        # Apply versioned migrations (replaces `db push --accept-data-loss`).
        # Baseline 0_init creates the pgvector extension before any vector column.
        working-directory: packages/db
        run: npx prisma migrate deploy

      # NOTE: skip packages/db/seed.ts — it has stale fixture data (AiJob.orgId
      # is now NOT NULL but the seed predates that migration). The E2E tests only
      # need the minimal fixtures in seed-e2e.ts.
      - name: Seed E2E fixtures
        run: npx tsx packages/db/seed-e2e.ts

      - name: Build web app
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start web server
        run: |
          # Redirect server stdout/stderr to a file so server-side errors
          # (e.g. 500 responses from API routes) are visible after the run.
          # Background processes lose stdout otherwise. See e2e-boundary.yml
          # for the same pattern.
          npm -w apps/web run start > /tmp/web-server.log 2>&1 &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run @write + @smoke tests
        # Use PLAYWRIGHT_JSON_OUTPUT_NAME so the JSON reporter writes directly to
        # the file, keeping stdout (globalSetup logs, progress) out of the JSON —
        # otherwise JSON.parse in the regression step fails silently on main and
        # every failure gets reported as "All E2E tests passed".
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: e2e-results.json
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx playwright test --grep "@write|@smoke" --reporter=json
          else
            npx playwright test --grep "@write|@smoke" --reporter=json || true
          fi

      - name: Dump web server log
        # Always run so the log is visible whether tests passed or failed.
        # Must come AFTER the test step — otherwise only startup messages get
        # captured (the previous placement was a bug from PR #150).
        if: always()
        run: |
          echo "::group::web server log (stdout+stderr)"
          if [ -f /tmp/web-server.log ]; then
            cat /tmp/web-server.log
          else
            echo "no web-server.log present"
          fi
          echo "::endgroup::"
          echo "::group::5xx + Error grep"
          grep -E "Error:|TypeError|RangeError|PrismaClient|Unhandled|500|UploadError|Storage" /tmp/web-server.log 2>/dev/null || echo "no diagnostic markers found"
          echo "::endgroup::"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-write-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
            e2e-results.json
            /tmp/web-server.log
          retention-days: 14
          if-no-files-found: ignore

      - name: Check results and create regression issues
        # Only on main push / schedule — PR failures surface via exit code above.
        if: always() && (github.event_name == 'push' || github.event_name == 'schedule')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f e2e-results.json ]; then
            echo "No e2e results file found"
            exit 0
          fi

          FAILED_TESTS=$(cat e2e-results.json | node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('/dev/stdin', 'utf8'));
            const suites = data.suites || [];
            const failures = [];
            function walk(suite, parentTitle) {
              const suiteTitle = parentTitle ? parentTitle + ' > ' + (suite.title || '') : (suite.title || '');
              for (const spec of (suite.specs || [])) {
                for (const test of (spec.tests || [])) {
                  if (test.status === 'unexpected' || test.status === 'failed') {
                    failures.push({
                      title: suiteTitle + ' > ' + spec.title,
                      file: suite.file || '',
                      error: (test.results?.[0]?.error?.message || '').substring(0, 500)
                    });
                  }
                }
              }
              for (const child of (suite.suites || [])) { walk(child, suiteTitle); }
            }
            suites.forEach(s => walk(s, ''));
            console.log(JSON.stringify(failures));
          " 2>/dev/null || echo "[]")

          if [ "$FAILED_TESTS" = "[]" ] || [ -z "$FAILED_TESTS" ]; then
            echo "All E2E tests passed"
            exit 0
          fi

          echo "E2E failures detected, creating regression issues..."

          echo "$FAILED_TESTS" | node -e "
            const failures = JSON.parse(require('fs').readFileSync('/dev/stdin', 'utf8'));
            for (const f of failures) {
              const wiMatch = f.title.match(/WI-\d+/);
              const wiNum = wiMatch ? wiMatch[0] : 'UNKNOWN';
              console.log(JSON.stringify({ wi: wiNum, title: f.title, file: f.file, error: f.error }));
            }
          " | while IFS= read -r line; do
            WI_NUM=$(echo "$line" | node -e "console.log(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).wi)")
            TITLE=$(echo "$line" | node -e "console.log(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).title)")
            ERROR=$(echo "$line" | node -e "console.log(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).error)")
            FILE=$(echo "$line" | node -e "console.log(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).file)")

            # Skip when no WI prefix can be derived from the failing test title.
            # flowset.sh's inject_regression_wis() parses the issue title for a
            # WI-NNN pattern and exits under set -e when none is found, which
            # blocks the whole loop. Tests not tied to a specific WI should be
            # tracked through CI logs, not auto-issues.
            if [ "$WI_NUM" = "UNKNOWN" ] || [ -z "$WI_NUM" ]; then
              echo "Skipping issue creation — no WI prefix in test title: $TITLE"
              continue
            fi

            EXISTING=$(gh issue list --label regression --search "$WI_NUM" --state open --json number,title --jq "[.[] | select(.title | test(\"^${WI_NUM}[^0-9]\"))] | length" 2>/dev/null || echo "0")
            if [ "$EXISTING" != "0" ]; then
              echo "Skipping $WI_NUM - regression issue already exists"
              continue
            fi

            ISSUE_BODY="E2E 테스트 실패: WI=${WI_NUM}, 테스트=${TITLE}, 파일=${FILE}, 커밋=${{ github.sha }}. 에러: ${ERROR}"
            gh issue create \
              --label regression \
              --title "${WI_NUM} e2e 실패: ${TITLE}" \
              --body "$ISSUE_BODY" || true

            echo "Created regression issue for $WI_NUM"
          done
